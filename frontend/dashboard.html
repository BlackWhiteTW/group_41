<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>統計儀表板 | 社團表單系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand">Club Form Studio</a>
        <nav class="menu">
          <a class="link-btn" href="forms-view.html">填寫表單</a>
          <a class="link-btn" href="login.html">登入</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <h1 class="fade-up">統計儀表板</h1>
      <p class="muted fade-up" style="animation-delay: 100ms">
        下方資料為展示用。若要接後端，可改為 AJAX 讀取你的 PHP API。
      </p>

      <section class="card-grid" style="margin-top: 16px">
        <article class="panel fade-up" style="animation-delay: 160ms">
          <h3>關鍵指標</h3>
          <div class="stat">
            <div class="muted">本月新增表單</div>
            <strong>11</strong>
          </div>
          <div class="stat">
            <div class="muted">本月總填答</div>
            <strong>486</strong>
          </div>
          <div class="stat">
            <div class="muted">平均完成率</div>
            <strong>92%</strong>
          </div>
        </article>

        <article class="panel fade-up" style="animation-delay: 240ms">
          <h3>熱門表單</h3>
          <p>1. 迎新活動滿意度調查（123）</p>
          <p>2. 幹部培訓課程回饋（88）</p>
          <p>3. 社課設備需求調查（57）</p>
          <a class="btn btn-primary" href="forms-view.html">前往查看</a>
        </article>
      </section>
    </main>

    <footer class="footer container">Dashboard HTML prototype</footer>
  </body>
</html>
