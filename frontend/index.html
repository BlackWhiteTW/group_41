<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社團表單系統 | HTML 前端版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="index.html" class="brand">Club Form Studio</a>
        <nav class="menu">
          <a class="link-btn" href="dashboard.html">儀表板</a>
          <a class="link-btn" href="forms-view.html">填寫表單</a>
          <a class="link-btn" href="login.html">登入</a>
          <a class="btn btn-primary" href="register.html">註冊</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-grid">
          <article class="hero-card fade-up">
            <span class="badge">HTML Prototype</span>
            <h1>校園活動問卷平台<br />純前端展示版</h1>
            <p class="muted">
              這一版使用 HTML/CSS/JavaScript 製作，適合先做專題展示、UI
              定稿與操作流程模擬。
            </p>
            <div
              style="
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 14px;
              "
            >
              <a class="btn btn-primary" href="forms-view.html"
                >立即填一份表單</a
              >
              <a class="btn btn-ghost" href="dashboard.html">看統計面板</a>
            </div>
          </article>

          <aside class="panel stats fade-up" style="animation-delay: 120ms">
            <div class="stat">
              <div class="muted">公開表單</div>
              <strong>24</strong>
            </div>
            <div class="stat">
              <div class="muted">總填答次數</div>
              <strong>1,294</strong>
            </div>
            <div class="stat">
              <div class="muted">活躍社團</div>
              <strong>19</strong>
            </div>
          </aside>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <h2>公開表單清單</h2>
          <p class="muted">
            以下資料為示意 mock data，可直接改成你的真實內容。
          </p>
          <div id="public-form-list" class="card-grid"></div>
        </div>
      </section>
    </main>

    <footer class="footer container">
      社團表單系統 HTML 版 ・ 可再接回 PHP API
    </footer>

    <script src="assets/js/app.js"></script>
  </body>
</html>
